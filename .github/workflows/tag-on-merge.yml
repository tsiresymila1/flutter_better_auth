name: Tag on merge to main

# When a PR is merged (i.e. a push lands on main), tag the commit with the
# pubspec version (vX.Y.Z) if that tag does not already exist. Pushing the tag
# triggers the publish workflow. No tag is created when the version is unchanged,
# so ordinary merges never attempt to republish.
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A PAT (repo scope) is required so the pushed tag TRIGGERS publish.yml.
          # Tags pushed with the default GITHUB_TOKEN do not start other workflows.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version from pubspec.yaml
        id: version
        run: |
          set -euo pipefail
          version="$(grep -E '^version:' pubspec.yaml | head -n1 | sed -E 's/^version:[[:space:]]*//')"
          if [ -z "$version" ]; then
            echo "Could not read version from pubspec.yaml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "pubspec version: $version"

      - name: Create and push tag if new
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — nothing to release."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created tag $tag"

      - name: Create GitHub Release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Extract this version's section from CHANGELOG.md (### X.Y.Z ... next ###).
          awk -v ver="$VERSION" '
            $0 == "### " ver { flag=1; next }
            /^### / && flag { exit }
            flag { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "Release $TAG" > notes.md
          fi
          gh release create "$TAG" --title "$TAG" --notes-file notes.md --verify-tag
